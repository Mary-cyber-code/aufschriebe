<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Oberstufen-Lernportal</title>
    <style>
        /* ==========================================
           STRICKTE DRUCK- & DESIGN-REGELN (ERDTÖNE)
           ========================================== */
        * { box-sizing: border-box; }
        @page { size: A4; margin: 0; }
        
        @media screen {
            body { background-color: #f4f1ea; padding: 40px 0; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; }
            .page { background: #ffffff; width: 210mm; height: 297mm; padding: 20mm; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; border-radius: 4px; overflow: hidden; }
        }
        @media print {
            body { background: #ffffff; margin: 0; padding: 0; }
            .page { width: 210mm; height: 297mm; page-break-after: always; page-break-inside: avoid; padding: 20mm; position: relative; display: flex; flex-direction: column; overflow: hidden; }
            .no-print { display: none !important; }
        }
        
        /* Typografie & Standard-Elemente für Lernzettel */
        h1 { color: #8E6B5A; font-size: 24px; text-align: center; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 0; margin-bottom: 25px; border-bottom: 2px solid #8E6B5A; padding-bottom: 8px; }
        h2 { color: #8E6B5A; font-size: 18px; margin-top: 20px; margin-bottom: 12px; border-bottom: 1px dashed #C0A080; padding-bottom: 3px; }
        h3 { color: #8E6B5A; font-size: 15px; margin: 0 0 8px 0; }
        p, li { color: #8C4033; font-size: 13.5px; line-height: 1.5; margin-top: 0; margin-bottom: 8px; }
        ul { margin: 5px 0; padding-left: 18px; }
        .grid-2 { display: flex; gap: 15px; justify-content: space-between; margin-bottom: 15px; }
        .box { flex: 1; border: 1.5px solid #8E6B5A; border-radius: 6px; padding: 12px; background-color: #ffffff; }
        .accent-box { background-color: #fdfbf7; border-left: 4px solid #C0A080; padding: 10px 12px; margin: 12px 0; border-radius: 0 4px 4px 0; }
        .highlight { color: #C0A080; font-weight: bold; }
        .formula-block { font-family: 'Courier New', monospace; font-weight: bold; text-align: center; background: #faf6f0; padding: 8px; border: 1px dashed #8E6B5A; border-radius: 4px; margin: 10px 0; color: #8C4033; }
        .page-footer { margin-top: auto; border-top: 1px solid #8E6B5A; padding-top: 8px; display: flex; justify-content: space-between; font-size: 11px; color: #8E6B5A; background: #ffffff; }

        /* ==========================================
           ELEGANTES FLORAL-DASHBOARD DESIGN
           ========================================== */
        .dashboard { width: 100%; max-width: 950px; padding: 0 20px; text-align: center; position: relative; }
        
        /* Floral Line-Art Header Dekoration */
        .floral-header { margin-bottom: 10px; color: #8E6B5A; opacity: 0.8; }
        
        .dashboard h1 { border-bottom: none; font-size: 32px; font-weight: 300; letter-spacing: 3px; margin-bottom: 5px; color: #8E6B5A; }
        .dashboard-subtitle { color: #8C4033; font-style: italic; font-size: 14px; margin-bottom: 40px; letter-spacing: 1px; }
        
        .section-title { color: #8E6B5A; font-size: 16px; margin-top: 40px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .section-title::before, .section-title::after { content: ""; flex: 1; max-width: 100px; height: 1px; background-color: #C0A080; }
        
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        
        /* Edle Fächer-Karten */
        .subject-card { background: #ffffff; border: 1px solid #8E6B5A; border-radius: 12px; padding: 25px 15px; box-shadow: 0 4px 12px rgba(142,107,90,0.03); cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 120px; }
        .subject-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(142,107,90,0.12); border-color: #C0A080; }
        .subject-card h3 { margin: 0; color: #8E6B5A; font-size: 16px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
        
        /* ==========================================
           FACH-ÜBERSICHTSSEITE (SUB-PAGE)
           ========================================== */
        .sub-dashboard { width: 100%; max-width: 800px; padding: 0 20px; }
        .sub-dashboard h2 { font-size: 26px; font-weight: 300; text-transform: uppercase; letter-spacing: 2px; text-align: center; border-bottom: 1px solid #8E6B5A; padding-bottom: 15px; margin-bottom: 30px; }
        
        .category-block { background: #ffffff; border: 1px solid #8E6B5A; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.01); }
        .category-block h3 { color: #8E6B5A; font-size: 15px; text-transform: uppercase; border-bottom: 1px dashed #C0A080; padding-bottom: 5px; margin-bottom: 12px; letter-spacing: 0.5px; }
        
        .topic-list { list-style: none; padding: 0; margin: 0; }
        .topic-list li { margin-bottom: 8px; display: flex; align-items: center; }
        .topic-list li::before { content: "🍃"; margin-right: 8px; font-size: 12px; opacity: 0.7; }
        
        .topic-link { background: none; border: none; color: #8C4033; font-family: inherit; font-size: 14px; text-align: left; padding: 0; cursor: pointer; text-decoration: none; transition: color 0.2s; }
        .topic-link:hover { color: #C0A080; text-decoration: underline; }
        
        .no-topics { color: #C0A080; font-style: italic; font-size: 13px; margin: 5px 0; }
        
        /* Buttons & Hilfen */
        .btn-back { background-color: transparent; color: #8E6B5A; border: 1px solid #8E6B5A; padding: 8px 16px; border-radius: 6px; font-family: inherit; font-size: 13px; cursor: pointer; margin-bottom: 25px; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-back:hover { background-color: #8E6B5A; color: #ffffff; }
        .hidden { display: none !important; }
        .view-container { width: 100%; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>

    <div id="dashboard" class="dashboard no-print">
        <div class="floral-header">
            <svg width="80" height="60" viewBox="0 0 100 80" fill="none" stroke="currentColor" stroke-width="1.2">
                <path d="M50,75 C50,45 30,25 15,35 M50,60 C55,40 75,25 85,40 M50,75 C52,40 50,15 40,5" />
                <path d="M15,35 C10,25 25,15 30,25 C35,35 20,40 15,35 Z" fill="#faf6f0" />
                <path d="M85,40 C90,30 75,20 70,30 C65,40 80,45 85,40 Z" fill="#faf6f0" />
                <path d="M40,5 C30,-2 25,10 35,15 C45,20 45,10 40,5 Z" fill="#faf6f0" />
            </svg>
        </div>
        <h1>Studium & Notizen</h1>
        <div class="dashboard-subtitle">Meine digitale Oberstufen-Schaltzentrale</div>

        <div class="section-title">Leistungskurse</div>
        <div class="subject-grid">
            <div class="subject-card" onclick="showSubject('mathe')"><h3>Mathematik</h3></div>
            <div class="subject-card" onclick="showSubject('chemie')"><h3>Chemie</h3></div>
            <div class="subject-card" onclick="showSubject('gmk')"><h3>Gemeinschaftskunde</h3></div>
        </div>

        <div class="section-title">Grundkurse</div>
        <div class="subject-grid">
            <div class="subject-card" onclick="showSubject('deutsch')"><h3>Deutsch</h3></div>
            <div class="subject-card" onclick="showSubject('englisch')"><h3>Englisch</h3></div>
            <div class="subject-card" onclick="showSubject('bio')"><h3>Biologie</h3></div>
            <div class="subject-card" onclick="showSubject('kunst')"><h3>Kunst</h3></div>
            <div class="subject-card" onclick="showSubject('sport')"><h3>Sport</h3></div>
            <div class="subject-card" onclick="showSubject('religion')"><h3>Religion</h3></div>
            <div class="subject-card" onclick="showSubject('geschichte')"><h3>Geschichte</h3></div>
            <div class="subject-card" onclick="showSubject('geo')"><h3>Geographie</h3></div>
        </div>

        <div class="section-title">Orchidenfach</div>
        <div class="subject-grid">
            <div class="subject-card" onclick="showSubject('psy')"><h3>Psychologie</h3></div>
        </div>
    </div>


    <div id="subject-view" class="view-container hidden no-print">
        <div style="width: 100%; max-width: 800px; text-align: left;">
            <button class="btn-back" onclick="showDashboard()">← Zurück zu den Fächern</button>
        </div>
        
        <div class="sub-dashboard">
            <h2 id="current-subject-title">Fachname</h2>
            <div id="category-container">
                </div>
        </div>
    </div>


    <div id="lernzettel-view" class="view-container hidden">
        <div style="width: 210mm;" class="no-print">
            <button class="btn-back" id="btn-back-to-subject">← Zurück zur Fachübersicht</button>
        </div>

        <div id="lernzettel-content">
            </div>
    </div>


    <script>
        // Strukturierte Fächerdatenbank. Hier kannst du später ganz einfach Kategorien und Themen eintragen!
        const subjectData = {
            mathe: {
                title: "Mathematik (LK)",
                categories: {
                    "Analysis / Differentialrechnung": [
                        { name: "Ableitungsregeln & Tangenten", id: "mathe-ableitung" }
                    ],
                    "Stochastik": [], // Noch leer
                    "Wiederholung & Grundlagen": [] // Noch leer
                }
            },
            chemie: {
                title: "Chemie (LK)",
                categories: {
                    "Säure-Base-Gleichgewichte": [],
                    "Organische Chemie": [],
                    "Wiederholung Vorjahre": []
                }
            },
            gmk: { title: "Gemeinschaftskunde (LK)", categories: { "Politiksystem der BRD": [], "Internationale Beziehungen": [] } },
            deutsch: { title: "Deutsch", categories: { "Epochenübersicht": [], "Lektüren": [] } },
            englisch: { title: "Englisch", categories: { "Grammar Review": [], "Landeskunde": [] } },
            bio: { title: "Biologie", categories: { "Genetik": [], "Ökologie": [] } },
            kunst: { title: "Kunst", categories: { "Epochen": [], "Praxis-Techniken": [] } },
            sport: { title: "Sport", categories: { "Trainingslehre": [], "Bewegungsbiologie": [] } },
            religion: { title: "Religion", categories: { "Ethik": [], "Weltreligionen": [] } },
            geschichte: { title: "Geschichte", categories: { "19. Jahrhundert": [], "20. Jahrhundert": [] } },
            geo: { title: "Geographie", categories: { "Tektonik & Geologie": [], "Klimatologie": [] } },
            psy: { title: "Psychologie", categories: { "Kognitionspsychologie": [], "Entwicklungspsychologie": [] } }
        };

        let activeSubjectKey = "";

        // Zeigt die Unterseite eines Fachs an
        function showSubject(subjectKey) {
            activeSubjectKey = subjectKey;
            const subject = subjectData[subjectKey];
            
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('lernzettel-view').classList.add('hidden');
            document.getElementById('subject-view').classList.remove('hidden');
            
            document.getElementById('current-subject-title').innerText = subject.title;
